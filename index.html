<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極致霓虹派對大富翁</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', 'Comfortaa', sans-serif;
            background: radial-gradient(circle at center, #1e112a 0%, #0b0514 100%);
            overflow-x: hidden;
        }
        
        /* 霓虹發光效果 */
        .neon-border {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4), inset 0 0 15px rgba(168, 85, 247, 0.2);
        }
        .neon-text-pink {
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.8), 0 0 20px rgba(244, 114, 182, 0.4);
        }
        .neon-text-purple {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }
        .neon-text-blue {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8), 0 0 20px rgba(59, 130, 246, 0.4);
        }

        /* 骰子3D旋轉動畫 */
        .dice-scene {
            perspective: 400px;
        }
        .dice {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease-out;
        }
        .dice-face {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #e879f9 0%, #a855f7 100%);
            border: 2px solid #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 10px rgba(168, 85, 247, 0.5);
        }
        /* 骰子面朝向 */
        .face-1 { transform: rotateY(0deg) translateZ(30px); }
        .face-2 { transform: rotateY(90deg) translateZ(30px); }
        .face-3 { transform: rotateX(90deg) translateZ(30px); }
        .face-4 { transform: rotateX(-90deg) translateZ(30px); }
        .face-5 { transform: rotateY(-90deg) translateZ(30px); }
        .face-6 { transform: rotateY(180deg) translateZ(30px); }

        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e112a;
        }
        ::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 3px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between p-4">

    <!-- React 應用掛載點 -->

    <!-- 載入 React & Babel -->

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Web Audio 音效產生器 ---
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'roll') {
                    // 模擬骰子滾動聲 (短促低音爆裂)
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(100, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'land') {
                    // 抵達安全或普通格
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'punish') {
                    // 悲慘處罰
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'card') {
                    // 抽出卡牌
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.setValueAtTime(554, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                }
            } catch (e) {
                console.log("Audio not supported yet.");
            }
        };

        // --- 預設 36 格棋盤資料 ---

            { id: 35, name: "終極懲罰：四部位各20下", type: "red", desc: "屁股、陰莖、龜頭、蛋蛋各打20下！" }
        ];

        // --- 預設卡牌庫 ---
        const initialCards = [

            { id: 13, text: "飛機杯套弄1分鐘", type: "action" },
            { id: 14, text: "【打屁股】所有工具重打5下", type: "action" },
            { id: 15, text: "【打屁股】所有工具重打10下", type: "action" },
            { id: 16, text: "【打屁股】所有工具重打20下", type: "action" },
            { id: 17, text: "【打陰莖】所有工具打5下", type: "action" },
            { id: 18, text: "【打陰莖】所有工具打10下", type: "action" },
            { id: 19, text: "【打陰莖】所有工具打20下", type: "action" },
            { id: 20, text: "【打蛋蛋】所有工具打5下", type: "action" },
            { id: 21, text: "【打蛋蛋】所有工具打10下", type: "action" },
            { id: 22, text: "【打蛋蛋】所有工具打20下", type: "action" },
            { id: 23, text: "【打小菊】所有工具重打5下", type: "action" },
            { id: 24, text: "【打小菊】所有工具重打10下", type: "action" },
            { id: 25, text: "【打小菊】所有工具重打20下", type: "action" },
            { id: 26, text: "開合跳10次", type: "action" },
            { id: 27, text: "波比跳10次", type: "action" },
            { id: 28, text: "仰臥起坐10次", type: "action" },
            { id: 29, text: "按摩棒1分鐘", type: "action" },
            { id: 30, text: "按摩棒2分鐘", type: "action" },
            { id: 31, text: "按摩棒3分鐘", type: "action" },

            { id: 34, text: "手指插小菊3分鐘", type: "action" },
            { id: 35, text: "電擊器1~3分鐘", type: "action" },
            { id: 36, text: "插尿道1分鐘", type: "action" },
            { id: 37, text: "搔癢30秒", type: "action" },
            { id: 38, text: "搔癢1分鐘", type: "action" },
            { id: 39, text: "揉屁股30秒", type: "action" },
            { id: 40, text: "揉屁股1分鐘", type: "action" },
            { id: 41, text: "抵免5下", type: "keep", value: "reduce-5" },
            { id: 42, text: "抵免10下", type: "keep", value: "reduce-10" },
            { id: 43, text: "抵免15下", type: "keep", value: "reduce-15" },
            { id: 44, text: "抵免20下", type: "keep", value: "reduce-20" },
            { id: 45, text: "假屌捅1分鐘", type: "action" },
            { id: 46, text: "假屌捅3分鐘", type: "action" },
            { id: 47, text: "假屌捅到拔出來", type: "action" },
            { id: 48, text: "再抽一次", type: "draw-again" }
        ];

        function App() {
            // 遊戲基礎狀態
            const [tiles, setTiles] = useState(initialTiles);
            const [cardDeck, setCardDeck] = useState(initialCards);
            const [players, setPlayers] = useState([
                { id: 1, name: "主人", color: "pink", position: 0, avoidCount: 0, reduceAmount: 0 },
                { id: 2, name: "小奴", color: "purple", position: 0, avoidCount: 0, reduceAmount: 0 }
            ]);
            const [activePlayerIdx, setActivePlayerIdx] = useState(0);
            
            // 骰子與步數狀態
            const [diceVal, setDiceVal] = useState(1);
            const [isRolling, setIsRolling] = useState(false);
            const [rotation, setRotation] = useState({ x: 0, y: 0 });

            // 遊戲彈窗與對話框
            const [drawnCard, setDrawnCard] = useState(null);
            const [activePunishment, setActivePunishment] = useState(null); // 當前正要執行的懲罰描述
            const [gameLogs, setGameLogs] = useState(["✨ 歡迎來到霓虹大富翁，準備好受罰了嗎？"]);
            const [activeTab, setActiveTab] = useState("board"); // board, custom-tiles, custom-cards, rule

            // 編輯器暫存狀態
            const [editingTile, setEditingTile] = useState(null);
            const [newCardText, setNewCardText] = useState("");
            const [newCardType, setNewCardType] = useState("action");
            const [newCardValue, setNewCardValue] = useState("");

            // 骰子轉動方向 mapping
            const diceRotations = {
                1: { x: 0, y: 0 },
                2: { x: 0, y: -90 },
                3: { x: -90, y: 0 },
                4: { x: 90, y: 0 },
                5: { x: 0, y: 90 },
                6: { x: 0, y: 180 }
            };

            // 10x10 棋盤坐標分佈 (0 ~ 35 周圍格子)
            const getCoordinates = (idx) => {
                if (idx >= 0 && idx <= 9) return { row: 1, col: idx + 1 };
                if (idx >= 10 && idx <= 17) return { row: idx - 9 + 1, col: 10 };
                if (idx >= 18 && idx <= 27) return { row: 10, col: 10 - (idx - 18) };
                if (idx >= 28 && idx <= 35) return { row: 10 - (idx - 27), col: 1 };
                return { row: 1, col: 1 };
            };

            // 新增事件紀錄
            const addLog = (msg) => {
                setGameLogs(prev => [msg, ...prev]);
            };

            // 處理玩家位置移動後的事件觸發
            const handleTileLanding = (pIdx, position, isExtraMove = false) => {
                const curPlayer = players[pIdx];
                const tile = tiles[position];
                playSound('land');
                
                addLog(`📍 ${curPlayer.name} 停留在【${tile.name}】`);

                // 黃色方格：卡牌
                if (tile.type === "yellow") {
                    setTimeout(() => drawCard(pIdx), 1000);
                } 
                // 藍色方格：特殊動作
                else if (tile.type === "blue") {
                    if (tile.name.includes("向前３步")) {
                        setTimeout(() => {
                            addLog("🚀 觸發向前３步！");
                            movePlayer(pIdx, 3, true);
                        }, 1200);
                    } else if (tile.name.includes("向後５步")) {
                        setTimeout(() => {
                            addLog("↩️ 觸發向後５步！");
                            movePlayer(pIdx, -5, true);
                        }, 1200);
                    } else if (tile.name.includes("再骰一次")) {
                        addLog(`🔥 幸運！${curPlayer.name} 獲得再次擲骰機會！`);
                        // 不轉移回合
                    }
                } 
                // 紅色、橘色：正常懲罰項目
                else if (tile.type === "red" || tile.type === "orange") {
                    playSound('punish');
                    setActivePunishment({
                        title: tile.name,
                        desc: tile.desc || "無詳細說明",
                        playerIdx: pIdx,
                        isCard: false
                    });
                }
            };

            // 行動玩家移動
            const movePlayer = (pIdx, steps, isExtraMove = false) => {
                setPlayers(prev => {
                    const updated = [...prev];
                    let nextPos = updated[pIdx].position + steps;
                    
                    // 循環環繞
                    if (nextPos >= 36) nextPos = nextPos - 36;
                    if (nextPos < 0) nextPos = 36 + nextPos;

                    updated[pIdx].position = nextPos;
                    
                    // 延遲觸發，等待位置更新
                    setTimeout(() => handleTileLanding(pIdx, nextPos, isExtraMove), 500);
                    return updated;
                });
            };

            // 擲骰子
            const rollDice = () => {
                if (isRolling) return;
                setIsRolling(true);
                playSound('roll');

                let spins = 0;
                const interval = setInterval(() => {
                    // 隨機旋轉，製造動態效果
                    setRotation({
                        x: Math.random() * 360,
                        y: Math.random() * 360
                    });
                    spins++;
                    if (spins > 8) {
                        clearInterval(interval);
                        
                        // 決定最後數字
                        const finalNum = Math.floor(Math.random() * 6) + 1;
                        setDiceVal(finalNum);
                        setRotation(diceRotations[finalNum]);
                        setIsRolling(false);

                        addLog(`🎲 ${players[activePlayerIdx].name} 擲出了 ${finalNum} 點！`);
                        movePlayer(activePlayerIdx, finalNum);

                        // 判斷是否需要切換玩家（如果沒抽到「再骰一次」格子）
                        const currentLandingTile = tiles[(players[activePlayerIdx].position + finalNum) % 36];
                        if (!currentLandingTile.name.includes("再骰一次")) {
                            setActivePlayerIdx(prev => (prev + 1) % players.length);
                        }
                    }
                }, 100);
            };

            // 抽卡牌
            const drawCard = (pIdx) => {
                playSound('card');
                const randomCard = cardDeck[Math.floor(Math.random() * cardDeck.length)];
                setDrawnCard({ ...randomCard, playerIdx: pIdx });
                addLog(`🃏 ${players[pIdx].name} 抽到了卡牌：【${randomCard.text}】`);
            };

            // 處理抽完卡後的動作
            const handleCardAction = (card, accept) => {
                const player = players[card.playerIdx];
                if (accept) {
                    if (card.type === "keep") {
                        // 獲得功能卡
                        setPlayers(prev => {
                            const updated = [...prev];
                            if (card.value === "avoid") {
                                updated[card.playerIdx].avoidCount += 1;
                                addLog(`🛡️ ${player.name} 將【免死金牌】放入背包。`);
                            } else if (card.value.startsWith("reduce-")) {
                                const amount = parseInt(card.value.split("-")[1]);
                                updated[card.playerIdx].reduceAmount += amount;
                                addLog(`🩹 ${player.name} 將【抵免 ${amount} 下】存入背包。`);
                            }
                            return updated;
                        });
                    } else if (card.type === "draw-again") {
                        addLog(`🔄 再次抽卡！`);
                        drawCard(card.playerIdx);
                    } else {
                        // 執行即時懲罰
                        playSound('punish');
                        setActivePunishment({
                            title: "卡牌懲罰",
                            desc: card.text,
                            playerIdx: card.playerIdx,
                            isCard: true
                        });
                    }
                } else {
                    addLog(`❌ ${player.name} 放棄使用該卡。`);
                }
                setDrawnCard(null);
            };

            // 使用免死金牌或抵免
            const useAvoidCard = (pIdx, type) => {
                setPlayers(prev => {
                    const updated = [...prev];
                    if (type === "avoid" && updated[pIdx].avoidCount > 0) {
                        updated[pIdx].avoidCount -= 1;
                        addLog(`🛡️ ${updated[pIdx].name} 使用了【免死金牌】！本次懲罰全免！`);
                        setActivePunishment(null);
                    } else if (type === "reduce" && updated[pIdx].reduceAmount > 0) {
                        // 扣減抵免
                        const reduction = updated[pIdx].reduceAmount;
                        updated[pIdx].reduceAmount = 0; // 一次性用完或扣減
                        addLog(`🩹 ${updated[pIdx].name} 消耗了抵免值，抵消傷害！`);
                        setActivePunishment(prev => {
                            if (!prev) return null;
                            return {
                                ...prev,
                                desc: prev.desc + `（已成功抵免/減輕傷害！）`
                            };
                        });
                    }
                    return updated;
                });
            };

            // 保存棋格編輯
            const saveTileEdit = () => {
                if (!editingTile) return;
                setTiles(prev => {
                    const updated = [...prev];
                    updated[editingTile.id] = { ...editingTile };
                    return updated;
                });
                addLog(`⚙️ 修改了棋格 ${editingTile.id} 內容為：【${editingTile.name}】`);
                setEditingTile(null);
            };

            // 刪除自訂卡牌
            const deleteCard = (id) => {
                setCardDeck(prev => prev.filter(c => c.id !== id));
            };

            // 新增卡牌
            const addNewCard = () => {
                if (!newCardText.trim()) return;
                const newCard = {
                    id: Date.now(),
                    text: newCardText,
                    type: newCardType,
                    value: newCardValue
                };
                setCardDeck(prev => [...prev, newCard]);
                setNewCardText("");
                setNewCardValue("");
                addLog(`➕ 新增了卡牌到牌庫：【${newCardText}】`);
            };

            return (
                <div class="flex flex-col gap-6 select-none">
                    {/* Header */}
                    <header class="flex flex-col md:flex-row items-center justify-between border-b border-purple-900/40 pb-4">
                        <div class="text-center md:text-left">
                            <h1 class="text-4xl font-extrabold tracking-wider text-pink-500 neon-text-pink">
                                NEON BDSM MONOPOLY
                            </h1>
                            <p class="text-xs text-purple-400 mt-1 uppercase tracking-widest font-mono">
                                專為親密伴侶 & 派對打造的調教娛樂大富翁
                            </p>
                        </div>
                        <div class="flex gap-2 mt-4 md:mt-0 bg-slate-900/80 p-1.5 rounded-full border border-purple-900/30">
                            <button 
                                onClick={() => setActiveTab("board")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "board" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                🎮 遊戲棋盤
                            </button>
                            <button 
                                onClick={() => setActiveTab("custom-tiles")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "custom-tiles" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                ✏️ 自訂棋格
                            </button>
                            <button 
                                onClick={() => setActiveTab("custom-cards")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "custom-cards" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                🃏 牌庫管理
                            </button>
                            <button 
                                onClick={() => setActiveTab("rule")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "rule" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                📜 規則說明
                            </button>
                        </div>
                    </header>

                    {/* 主區域 */}
                    {activeTab === "board" && (
                        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                            
                            {/* 10x10 大富翁棋盤區域 (佔 8 欄) */}
                            <div class="xl:col-span-8 bg-slate-950/80 p-4 rounded-3xl border border-purple-500/20 neon-border flex items-center justify-center overflow-auto">
                                <div class="grid grid-cols-10 grid-rows-10 gap-1.5 w-[760px] h-[760px] relative">
                                    
                                    {/* 棋盤格子渲染 */}
                                    {tiles.map((tile, idx) => {
                                        const coords = getCoordinates(idx);
                                        // 樣式對應
                                        let bgStyle = "";
                                        let textStyle = "text-slate-100";
                                        if (tile.type === "red") {
                                            bgStyle = "bg-gradient-to-br from-red-950 to-red-900 border-red-500/50 hover:border-red-400";
                                        } else if (tile.type === "orange") {
                                            bgStyle = "bg-gradient-to-br from-orange-950 to-orange-900 border-orange-500/50 hover:border-orange-400";
                                        } else if (tile.type === "yellow") {
                                            bgStyle = "bg-gradient-to-br from-yellow-950 to-yellow-900 border-yellow-500/50 hover:border-yellow-400";
                                        } else if (tile.type === "blue") {
                                            bgStyle = "bg-gradient-to-br from-blue-950 to-blue-900 border-blue-500/50 hover:border-blue-400";
                                        } else {
                                            bgStyle = "bg-gradient-to-br from-pink-950 to-pink-900 border-pink-500/50 hover:border-pink-400";
                                        }

                                        // 檢查該格是否有玩家停駐
                                        const landedPlayers = players.filter(p => p.position === idx);

                                        return (
                                            <div 
                                                key={idx}
                                                style={{ gridRow: coords.row, gridColumn: coords.col }}
                                                onClick={() => { setEditingTile(tile); setActiveTab("custom-tiles"); }}
                                                class={`border rounded-xl p-1.5 flex flex-col justify-between cursor-pointer transition-all hover:scale-105 duration-200 aspect-square ${bgStyle}`}>
                                                
                                                <div class="flex justify-between items-start">
                                                    <span class="text-[9px] font-mono text-slate-400 bg-black/40 px-1 rounded">
                                                        #{idx}
                                                    </span>
                                                    <span class="text-[9px] font-bold text-purple-300 uppercase">
                                                        {tile.type}
                                                    </span>
                                                </div>

                                                <div class="text-[11px] font-bold text-center leading-tight line-clamp-2 my-auto">
                                                    {tile.name}
                                                </div>

                                                {/* 玩家 Token 指示器 */}
                                                <div class="flex gap-1 justify-center mt-1 h-4">
                                                    {landedPlayers.map(p => (
                                                        <span 
                                                            key={p.id}
                                                            class={`w-3.5 h-3.5 rounded-full border border-white animate-bounce ${
                                                                p.color === 'pink' ? 'bg-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.8)]' : 'bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.8)]'
                                                            }`}
                                                            title={p.name}
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}

                                    {/* 棋盤內圈控制中心 (2至9行, 2至9列) */}
                                    <div class="col-start-2 col-end-10 row-start-2 row-end-10 bg-slate-900/60 rounded-2xl flex flex-col p-6 items-center justify-between gap-4 border border-purple-900/30">
                                        
                                        {/* 標題與當前玩家顯示 */}
                                        <div class="text-center">
                                            <h3 class="text-lg text-purple-300 font-mono tracking-wider">NEXT PLAYER</h3>
                                            <div class="text-3xl font-black mt-1 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">
                                                👉 {players[activePlayerIdx].name} 👈
                                            </div>
                                        </div>

                                        {/* 3D 骰子 & 操控按鈕 */}
                                        <div class="flex flex-col items-center gap-6">
                                            <div class="dice-scene" onClick={rollDice}>
                                                <div class="dice cursor-pointer" style={{ transform: `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)` }}>
                                                    <div class="dice-face face-1"><span class="w-3 h-3 bg-white rounded-full"></span></div>
                                                    <div class="dice-face face-2"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-3"><span class="grid grid-cols-3 gap-2"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-4"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-5"><span class="grid grid-cols-3 gap-1.5"><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-6"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={rollDice}
                                                disabled={isRolling}
                                                class="px-8 py-3 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-full text-lg shadow-lg hover:shadow-purple-500/20 active:scale-95 transition-all disabled:opacity-50">
                                                {isRolling ? "🎲 滾動中..." : "👉 丟骰子 👈"}
                                            </button>
                                        </div>

                                        {/* 底部裝飾 */}
                                        <div class="text-center text-xs text-slate-500">
                                            點擊邊緣任意棋格可直接進行自訂編輯
                                        </div>
                                    </div>

                                </div>
                            </div>

                            {/* 狀態日誌與背包系統 (佔 4 欄) */}
                            <div class="xl:col-span-4 flex flex-col gap-6">
                                
                                {/* 玩家狀態卡 */}
                                <div class="bg-slate-950/80 p-5 rounded-2xl border border-purple-500/20">
                                    <h3 class="text-xl font-bold text-purple-400 mb-4 flex items-center gap-2">
                                        <i class="fa-solid fa-users"></i> 玩家狀態與背包
                                    </h3>
                                    <div class="grid grid-cols-1 gap-4">
                                        {players.map((p, idx) => (
                                            <div 
                                                key={p.id}
                                                class={`p-4 rounded-xl border transition-all ${
                                                    activePlayerIdx === idx 
                                                    ? 'bg-purple-950/30 border-purple-500/60 shadow-lg' 
                                                    : 'bg-slate-900/50 border-slate-800'
                                                }`}>
                                                <div class="flex items-center justify-between mb-2">
                                                    <div class="flex items-center gap-2">
                                                        <span class={`w-3 h-3 rounded-full ${p.color === 'pink' ? 'bg-pink-500' : 'bg-purple-500'}`} />
                                                        <span class="font-bold text-lg text-slate-100">{p.name}</span>
                                                    </div>
                                                    <span class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-full font-mono">
                                                        位置: {p.position} / 35
                                                    </span>
                                                </div>
                                                <div class="grid grid-cols-2 gap-2 text-sm pt-2 border-t border-slate-800/60">
                                                    <div class="bg-black/30 p-2 rounded text-center">
                                                        <div class="text-xs text-slate-400">🛡️ 免死金牌</div>
                                                        <div class="text-lg font-bold text-pink-400">{p.avoidCount} 張</div>
                                                    </div>
                                                    <div class="bg-black/30 p-2 rounded text-center">
                                                        <div class="text-xs text-slate-400">🩹 累計可抵免</div>
                                                        <div class="text-lg font-bold text-yellow-400">{p.reduceAmount} 下</div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 即時遊戲日誌 */}
                                <div class="bg-slate-950/80 p-5 rounded-2xl border border-purple-500/20 flex-grow flex flex-col">
                                    <h3 class="text-xl font-bold text-purple-400 mb-3 flex items-center justify-between">
                                        <span class="flex items-center gap-2">
                                            <i class="fa-solid fa-list-ul"></i> 調教日誌記錄
                                        </span>
                                        <button 
                                            onClick={() => setGameLogs([])}
                                            class="text-xs text-slate-500 hover:text-slate-300">
                                            清除
                                        </button>
                                    </h3>
                                    <div class="bg-black/40 p-4 rounded-xl flex-grow h-[350px] overflow-y-auto font-mono text-sm leading-relaxed flex flex-col gap-2.5">
                                        {gameLogs.length === 0 ? (
                                            <div class="text-slate-600 italic text-center my-auto">無日誌紀錄</div>
                                        ) : (
                                            gameLogs.map((log, i) => (
                                                <div key={i} class="border-b border-purple-950/20 pb-1.5 last:border-0 text-slate-300">
                                                    {log}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                            </div>

                        </div>
                    )}

                    {/* 自訂棋格 Tab */}
                    {activeTab === "custom-tiles" && (
                        <div class="bg-slate-950/80 p-6 rounded-3xl border border-purple-500/20 max-w-4xl mx-auto w-full">
                            <h2 class="text-2xl font-black text-pink-500 neon-text-pink mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-pen-to-square"></i> 棋盤格完全自訂
                            </h2>
                            <p class="text-sm text-slate-400 mb-6">
                                點擊下方任何一個格子或在棋盤畫面上直接點擊，修改其懲罰項目與配色屬性。
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 選擇列表 */}
                                <div class="md:col-span-1 bg-black/40 p-4 rounded-2xl max-h-[500px] overflow-y-auto flex flex-col gap-2">
                                    {tiles.map((t) => (
                                        <div 
                                            key={t.id}
                                            onClick={() => setEditingTile(t)}
                                            class={`p-3 rounded-xl border text-sm cursor-pointer transition-all ${
                                                editingTile?.id === t.id 
                                                ? 'bg-purple-900/40 border-purple-500 shadow-md' 
                                                : 'bg-slate-900/50 border-slate-800 hover:bg-slate-900'
                                            }`}>
                                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                                                <span>#{t.id}</span>
                                                <span class="uppercase font-bold">{t.type}</span>
                                            </div>
                                            <div class="font-bold truncate">{t.name}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* 編輯細節區 */}
                                <div class="md:col-span-2 bg-slate-900/40 p-6 rounded-2xl border border-purple-950 flex flex-col justify-between">
                                    {editingTile ? (
                                        <div class="flex flex-col gap-4">
                                            <h3 class="text-xl font-bold text-purple-300 pb-2 border-b border-purple-950">
                                                正在編輯第 #{editingTile.id} 格
                                            </h3>
                                            
                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">棋格名稱 (顯示於標題)</label>
                                                <input 
                                                    type="text"
                                                    value={editingTile.name}
                                                    onChange={(e) => setEditingTile({ ...editingTile, name: e.target.value })}
                                                    class="bg-black/50 border border-purple-900/50 rounded-lg p-3 text-slate-100 focus:outline-none focus:border-purple-500"
                                                />
                                            </div>

                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">詳細執行說明 (描述懲罰道具或數量)</label>
                                                <textarea 
                                                    rows="3"
                                                    value={editingTile.desc}
                                                    onChange={(e) => setEditingTile({ ...editingTile, desc: e.target.value })}
                                                    class="bg-black/50 border border-purple-900/50 rounded-lg p-3 text-slate-100 focus:outline-none focus:border-purple-500"
                                                />
                                            </div>

                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">棋格類別 (影響顏色與觸發規則)</label>
                                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                    {[
                                                        { label: "紅色 (強烈懲罰)", value: "red", color: "bg-red-500" },
                                                        { label: "橘色 (普通懲罰)", value: "orange", color: "bg-orange-500" },
                                                        { label: "黃色 (抽取卡牌)", value: "yellow", color: "bg-yellow-500" },
                                                        { label: "藍色 (特殊動作)", value: "blue", color: "bg-blue-500" },
                                                        { label: "粉色 (安全格子)", value: "pink", color: "bg-pink-500" }
                                                    ].map((opt) => (
                                                        <button 
                                                            key={opt.value}
                                                            onClick={() => setEditingTile({ ...editingTile, type: opt.value })}
                                                            class={`p-2.5 rounded-lg border text-xs font-bold transition-all flex items-center gap-2 ${
                                                                editingTile.type === opt.value 
                                                                ? 'border-white ring-2 ring-purple-500' 
                                                                : 'border-slate-800 opacity-60 hover:opacity-100'
                                                            }`}>
                                                            <span class={`w-2.5 h-2.5 rounded-full ${opt.color}`} />
                                                            {opt.label.split(" ")[0]}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div class="flex gap-4 mt-6">
                                                <button 
                                                    onClick={saveTileEdit}
                                                    class="flex-1 py-3 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold transition-all text-white">
                                                    💾 保存棋格變更
                                                </button>
                                                <button 
                                                    onClick={() => setEditingTile(null)}
                                                    class="py-3 px-6 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-all">
                                                    取消
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="text-center text-slate-500 my-auto py-12 flex flex-col items-center gap-4">
                                            <i class="fa-solid fa-arrow-left text-4xl text-purple-900"></i>
                                            請從左側點選一格，或直接在棋盤點選格子開始自定義內容。
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂卡牌 Tab */}
                    {activeTab === "custom-cards" && (
                        <div class="bg-slate-950/80 p-6 rounded-3xl border border-purple-500/20 max-w-4xl mx-auto w-full">
                            <h2 class="text-2xl font-black text-pink-500 neon-text-pink mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-rectangle-list"></i> 命運卡牌庫管理
                            </h2>
                            <p class="text-sm text-slate-400 mb-6">
                                您可以隨時新增新的卡牌命令、或將不適合的卡牌移除。現有牌庫總數: <strong class="text-pink-400 font-mono">{cardDeck.length}</strong> 張。
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 新增卡牌區域 */}
                                <div class="bg-slate-900/40 p-5 rounded-2xl border border-purple-950/60 flex flex-col gap-4">
                                    <h3 class="text-lg font-bold text-purple-300">➕ 新增邪惡卡牌</h3>
                                    
                                    <div class="flex flex-col gap-1.5">
                                        <label class="text-xs text-slate-400">卡牌文字</label>
                                        <input 
                                            type="text"
                                            value={newCardText}
                                            onChange={(e) => setNewCardText(e.target.value)}
                                            placeholder="例：打陰莖10下"
                                            class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none"
                                        />
                                    </div>

                                    <div class="flex flex-col gap-1.5">
                                        <label class="text-xs text-slate-400">卡牌屬性</label>
                                        <select 
                                            value={newCardType} 
                                            onChange={(e) => setNewCardType(e.target.value)}
                                            class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none">
                                            <option value="action">即時懲罰 (如被撸、打蛋蛋)</option>
                                            <option value="keep">功能卡 (存入玩家背包待用)</option>
                                            <option value="draw-again">再抽一次</option>
                                        </select>
                                    </div>

                                    {newCardType === "keep" && (
                                        <div class="flex flex-col gap-1.5">
                                            <label class="text-xs text-slate-400">功能卡類別</label>
                                            <select 
                                                value={newCardValue} 
                                                onChange={(e) => setNewCardValue(e.target.value)}
                                                class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none">
                                                <option value="">--請選擇類型--</option>
                                                <option value="avoid">免死金牌</option>
                                                <option value="reduce-5">抵免 5 下</option>
                                                <option value="reduce-10">抵免 10 下</option>
                                                <option value="reduce-15">抵免 15 下</option>
                                                <option value="reduce-20">抵免 20 下</option>
                                            </select>
                                        </div>
                                    )}

                                    <button 
                                        onClick={addNewCard}
                                        class="py-2.5 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-lg transition-all text-sm mt-2">
                                        新增至卡牌庫
                                    </button>
                                </div>

                                {/* 卡牌列表區域 */}
                                <div class="md:col-span-2 bg-black/40 p-5 rounded-2xl flex flex-col">
                                    <h3 class="text-lg font-bold text-purple-300 mb-4">📜 當前牌庫卡牌列表</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2">
                                        {cardDeck.map((card) => (
                                            <div 
                                                key={card.id}
                                                class="bg-slate-900/80 p-3 rounded-xl border border-purple-900/20 flex items-center justify-between gap-3">
                                                <div class="flex flex-col min-w-0">
                                                    <span class="text-[14px] font-bold text-slate-200 truncate">{card.text}</span>
                                                    <span class="text-[10px] text-pink-400 font-mono mt-0.5 uppercase">
                                                        {card.type === 'keep' ? `功能卡: ${card.value}` : card.type}
                                                    </span>
                                                </div>
                                                <button 
                                                    onClick={() => deleteCard(card.id)}
                                                    class="text-slate-500 hover:text-red-400 p-1.5 transition-colors">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 規則說明 Tab */}
                    {activeTab === "rule" && (
                        <div class="bg-slate-950/80 p-8 rounded-3xl border border-purple-500/20 max-w-3xl mx-auto w-full text-slate-300 leading-relaxed">
                            <h2 class="text-3xl font-black text-pink-500 neon-text-pink mb-4 text-center">
                                📜 調教大富翁遊戲規則
                            </h2>
                            
                            <div class="space-y-6">
                                <div>
                                    <h3 class="text-xl font-bold text-purple-400 mb-2">🎲 基本玩法</h3>
                                    <p>每回合玩家輪流擲出骰子，玩家角色會按照點數移動對應的步數。停留在特定棋格時，會依該格顏色觸發不同事件。</p>
                                </div>

                                <div>
                                    <h3 class="text-xl font-bold text-purple-400 mb-2">🎨 棋格顏色標誌</h3>
                                    <ul class="list-disc pl-5 space-y-2">
                                        <li><strong class="text-pink-400">粉色格 (安全沒事)</strong>: 安全無憂，玩家不會受到任何處罰。</li>
                                        <li><strong class="text-yellow-400">黃色格 (卡牌)</strong>: 玩家需抽取一張隨機卡牌，並執行卡牌上的邪惡指令。</li>
                                        <li><strong class="text-red-400">紅色 & 橘色格 (懲罰項目)</strong>: 停留在該處的玩家，將由「對方」使用指定的工具執行上面的處罰項目。</li>
                                        <li><strong class="text-blue-400">藍色格 (特殊動作)</strong>: 包含自動向前 3 步、向後 5 步、或幸運再骰一次。</li>
                                    </ul>
                                </div>

                                <div>
                                    <h3 class="text-xl font-bold text-purple-400 mb-2">🎒 背包與抵免機制</h3>
                                    <p>當在卡牌格子中抽中 <strong class="text-pink-400">「免死金牌」</strong> 或 <strong class="text-yellow-400">「抵免次數」</strong> 時，該道具會存入當前玩家的背包。在未來的任何處罰事件中，玩家可以透過點擊背包按鈕，來免除本次處罰或折抵痛楚！</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer class="text-center text-xs text-slate-500 mt-6 pb-4">
                        請理性遊戲，與伴侶遊玩時注意安全與愉悅邊界。此版本支持百分百內容自定義。
                    </footer>

                    {/* --- 彈窗對話框 1：命運卡牌翻開動畫 --- */}
                    {drawnCard && (
                        <div class="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm animate-fade-in">
                            <div class="bg-gradient-to-br from-slate-900 to-purple-950 border-2 border-yellow-500 p-8 rounded-3xl max-w-sm w-full text-center shadow-[0_0_30px_rgba(234,179,8,0.3)]">
                                <div class="text-xs font-mono uppercase text-yellow-500 tracking-widest mb-2 font-bold animate-pulse">
                                    -- CARD DRAWN --
                                </div>
                                <div class="w-20 h-28 bg-yellow-500/10 border-2 border-dashed border-yellow-500/50 rounded-xl mx-auto flex items-center justify-center mb-6">
                                    <i class="fa-solid fa-wand-magic-sparkles text-4xl text-yellow-500"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-300 mb-1">
                                    【{players[drawnCard.playerIdx].name}】抽到了：
                                </h3>
                                <div class="text-2xl font-black text-white px-4 py-4 bg-black/40 rounded-xl border border-yellow-500/20 mb-6 neon-text-purple">
                                    {drawnCard.text}
                                </div>
                                <div class="flex flex-col gap-2.5">
                                    <button 
                                        onClick={() => handleCardAction(drawnCard, true)}
                                        class="w-full py-3 bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-black font-black rounded-xl text-md transition-all">
                                        確定執行 / 納入背包
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 彈窗對話框 2：懲罰宣告與抵免使用 --- */}
                    {activePunishment && (
                        <div class="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm animate-fade-in">
                            <div class="bg-gradient-to-br from-slate-900 to-red-950 border-2 border-red-500 p-8 rounded-3xl max-w-md w-full text-center shadow-[0_0_30px_rgba(239,68,68,0.3)]">
                                <div class="text-xs font-mono uppercase text-red-500 tracking-widest mb-2 font-bold animate-pulse">
                                    ⚠️ -- EXECUTE PUNISHMENT -- ⚠️
                                </div>
                                <div class="w-16 h-16 bg-red-500/20 rounded-full mx-auto flex items-center justify-center mb-4">
                                    <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500 animate-bounce"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-300">
                                    受罰者：<span class="text-red-400 text-xl font-black">{players[activePunishment.playerIdx].name}</span>
                                </h3>
                                
                                <div class="text-2xl font-black text-white px-4 py-5 bg-black/50 rounded-xl border border-red-500/20 my-6">
                                    {activePunishment.title}
                                    <div class="text-sm font-normal text-slate-400 mt-2">
                                        {activePunishment.desc}
                                    </div>
                                </div>

                                {/* 被包道具檢索 */}
                                <div class="bg-black/40 p-3 rounded-xl border border-slate-800 mb-6 text-left">
                                    <div class="text-xs text-slate-400 mb-2">可使用的手牌道具：</div>
                                    <div class="flex gap-2">
                                        <button 
                                            disabled={players[activePunishment.playerIdx].avoidCount === 0}
                                            onClick={() => useAvoidCard(activePunishment.playerIdx, 'avoid')}
                                            class="flex-1 py-2 px-3 bg-pink-900/40 hover:bg-pink-900/80 border border-pink-500 rounded-lg text-xs font-bold transition-all disabled:opacity-30 disabled:pointer-events-none">
                                            🛡️ 免死金牌 ({players[activePunishment.playerIdx].avoidCount})
                                        </button>
                                        <button 
                                            disabled={players[activePunishment.playerIdx].reduceAmount === 0}
                                            onClick={() => useAvoidCard(activePunishment.playerIdx, 'reduce')}
                                            class="flex-1 py-2 px-3 bg-yellow-900/40 hover:bg-yellow-900/80 border border-yellow-500 rounded-lg text-xs font-bold transition-all disabled:opacity-30 disabled:pointer-events-none">
                                            🩹 抵免 ({players[activePunishment.playerIdx].reduceAmount}下)
                                        </button>
                                    </div>
                                </div>

                                <div class="flex gap-3">
                                    <button 
                                        onClick={() => {
                                            addLog(`✅ ${players[activePunishment.playerIdx].name} 執行了處罰【${activePunishment.title}】`);
                                            setActivePunishment(null);
                                        }}
                                        class="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl transition-all">
                                        乖乖受罰 (完成)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```eof

### 🎲 調教大富翁操作技巧：
1. **丟骰子：** 點擊中間的 3D 骰子，或是底部的「丟骰子」按鈕，骰子會快速立體旋轉並自動判定移動。
2. **自動觸發規則：** 走到藍色特殊格（例如「向前3步」、「向後5步」）時，系統會等待0.5秒後自動幫角色進行瞬移與二次結算。
3. **完全自訂：** 想要更改起點打屁股的數量嗎？切換到「自訂棋格」Tab 頁面，點選你想要更改的棋格，就能自由打字、改名字與更換底色！
4. **功能卡管理：** 卡牌庫自帶數十張刺激又趣味的邪惡與功能性命令，您還可以手動新增自製的專屬調教卡！
