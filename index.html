        // --- Web Audio 音效產生器 ---
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'roll') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(100, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'land') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'punish') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(90, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'card') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.setValueAtTime(554, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.45);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                }

                console.log("Audio contexts active.");
            }
        };

        // 智能語意下數解析器
        const parseEstimatedHits = (title, desc) => {
            const text = ((title || "") + " " + (desc || "")).toLowerCase();
            let multiplier = 1;
            
            if (text.includes("四部位各") || text.includes("4部位各") || text.includes("四處") || text.includes("4處")) {
                multiplier = 4;
            } else if (text.includes("兩部位") || text.includes("2部位") || text.includes("雙部位") || text.includes("雙邊")) {
                multiplier = 2;
            }
            
            const match = text.match(/(\d+)\s*下/);
            if (match) {
                return parseInt(match[1]) * multiplier;
            }
            return 0; 
        };

        // 霓虹代表色
        const colorPalette = [
            { id: "pink", name: "霓虹粉", bg: "bg-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.8)]", text: "text-pink-400" },

        function App() {

            const [tiles, setTiles] = useState(initialTiles);
            const [cardDeck, setCardDeck] = useState(initialCards);
            
            // 玩家狀態 - totalHits 記錄總挨打下數 
            const [players, setPlayers] = useState([
                { id: 1, name: "主人", color: "pink", position: 0, avoidCount: 0, reduceAmount: 0, lap: 1, totalHits: 0 },

            ]);
            
            const [activePlayerIdx, setActivePlayerIdx] = useState(0);

            const [maxLaps, setMaxLaps] = useState(2); 
            const [winner, setWinner] = useState(null); 
            const [isEarlyEnd, setIsEarlyEnd] = useState(false); // 標記是否為點擊結束按鈕提前結束
            
            // 大廳新增玩家暫存
            const [tempPlayerName, setTempPlayerName] = useState("");
            const [tempPlayerColor, setTempPlayerColor] = useState("blue");

            // 3D 骰子
            const [diceVal, setDiceVal] = useState(1);
            const [isRolling, setIsRolling] = useState(false);
            const [rotation, setRotation] = useState({ x: 0, y: 0 });

            // 彈窗
            const [drawnCard, setDrawnCard] = useState(null);
            
            // 處罰彈窗
            const [activePunishment, setActivePunishment] = useState(null);
            const [punishHits, setPunishHits] = useState(0); 
            
            const [gameLogs, setGameLogs] = useState(["✨ 歡迎來到SP大富翁！請在大廳配置人數、圈數，並點擊開始！"]);
            const [activeTab, setActiveTab] = useState("board"); 

            // 編輯器暫存
            const [editingTile, setEditingTile] = useState(null);
            const [newCardText, setNewCardText] = useState("");
            const [newCardType, setNewCardType] = useState("action");
            const [newCardValue, setNewCardValue] = useState("");

            const diceRotations = {
                1: { x: 0, y: 0 },
                2: { x: 0, y: -90 },
                3: { x: -90, y: 0 },
                4: { x: 90, y: 0 },
                5: { x: 0, y: 90 },
                6: { x: 0, y: 180 }
            };

            const getCoordinates = (idx) => {
                if (idx >= 0 && idx <= 9) return { row: 1, col: idx + 1 };
                if (idx >= 10 && idx <= 17) return { row: idx - 9 + 1, col: 10 };
                if (idx >= 18 && idx <= 27) return { row: 10, col: 10 - (idx - 18) };
                if (idx >= 28 && idx <= 35) return { row: 10 - (idx - 27), col: 1 };
                return { row: 1, col: 1 };
            };

            const addLog = (msg) => {
                setGameLogs(prev => [msg, ...prev]);
            };

            const getPlayerBgClass = (colorId) => {
                const found = colorPalette.find(c => c.id === colorId);
                return found ? found.bg : "bg-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.8)]";
            };

            const getPlayerTextClass = (colorId) => {
                const found = colorPalette.find(c => c.id === colorId);
                return found ? found.text : "text-pink-400";
            };

            // --- 大廳操作 ---
            const addPlayer = () => {
                if (!tempPlayerName.trim()) return;
                if (players.length >= 8) {
                    alert("⚠️ 玩家上限為 8 人！");
                    return;
                }
                const newPlayer = {
                    id: Date.now(),
                    name: tempPlayerName.trim(),
                    color: tempPlayerColor,
                    position: 0,
                    avoidCount: 0,
                    reduceAmount: 0,
                    lap: 1,

                if (players.length <= 2) {
                    alert("⚠️ 最少需要 2 位玩家！");
                    return;
                }
                setPlayers(prev => prev.filter(p => p.id !== id));
            };

            const updatePlayerName = (id, newName) => {
                setPlayers(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
            };

            // --- 隨時手動結束遊戲 ---
            const endGameEarly = () => {
                const confirmEnd = window.confirm("🚨 確定要提前結束遊戲，並結算目前的挨打戰報嗎？");
                if (!confirmEnd) return;

                // 排序找出當前圈數最多、格數最前面的領先者
                const sorted = [...players].sort((a, b) => {
                    if (a.lap !== b.lap) return b.lap - a.lap;
                    return b.position - a.position;
                });
                
                setIsEarlyEnd(true);
                setWinner(sorted[0]); // 設定領先者

                } 
                else if (tile.type === "blue") {
                    if (tile.name.includes("向前３步")) {
                        setTimeout(() => {
                            addLog(`🚀 觸發向前 3 步！`);
                            movePlayer(pIdx, 3);
                        }, 1200);

                            movePlayer(pIdx, -5);
                        }, 1200);

                    }
                } 
                else if (tile.type === "red" || tile.type === "orange") {
                    playSound('punish');
                    const estimated = parseEstimatedHits(tile.name, tile.desc);
                    setActivePunishment({
                        title: tile.name,
                        desc: tile.desc || "無詳細說明",
                        playerIdx: pIdx,
                        isCard: false
                    });
                    setPunishHits(estimated); 
                }
            };

            // 移動
            const movePlayer = (pIdx, steps) => {
                setPlayers(prev => {
                    const updated = [...prev];
                    let oldPos = updated[pIdx].position;
                    let nextPos = oldPos + steps;
                    let lapIncrement = 0;

                    if (steps > 0) {
                        if (nextPos >= 36) {
                            lapIncrement = Math.floor(nextPos / 36);
                            nextPos = nextPos % 36;
                        }
                    } else if (steps < 0) {
                        if (nextPos < 0) {
                            lapIncrement = -1;
                            nextPos = 36 + (nextPos % 36);
                            if (nextPos === 36) nextPos = 0;
                        }
                    }

                    if (lapIncrement !== 0) {
                        updated[pIdx].lap = Math.max(1, updated[pIdx].lap + lapIncrement);
                        addLog(`🚩 【${updated[pIdx].name}】 跨越起點！目前圈數：${updated[pIdx].lap} / ${maxLaps === "unlimited" ? "無限制" : maxLaps}`);
                        
                        if (maxLaps !== "unlimited" && updated[pIdx].lap > maxLaps) {
                            setTimeout(() => {
                                setIsEarlyEnd(false);
                                setWinner(updated[pIdx]);
                                addLog(`🏆 遊戲結束！【${updated[pIdx].name}】完成了 ${maxLaps} 圈，奪得本局大戰勝利！`);
                            }, 1000);
                        }
                    }

                    updated[pIdx].position = nextPos;
                    
                    const isGameOver = maxLaps !== "unlimited" && updated[pIdx].lap > maxLaps;
                    if (!isGameOver) {
                        setTimeout(() => handleTileLanding(pIdx, nextPos), 500);
                    }
                    return updated;
                });
            };

            // 擲骰子
            const rollDice = () => {
                if (isRolling) return;
                setIsRolling(true);
                playSound('roll');

                let spins = 0;
                const interval = setInterval(() => {
                    setRotation({
                        x: Math.random() * 360,
                        y: Math.random() * 360
                    });
                    spins++;
                    if (spins > 8) {
                        clearInterval(interval);
                        
                        const finalNum = Math.floor(Math.random() * 6) + 1;
                        setDiceVal(finalNum);
                        setRotation(diceRotations[finalNum]);
                        setIsRolling(false);

                        addLog(`🎲 【${players[activePlayerIdx].name}】 擲出了 ${finalNum} 點！`);
                        movePlayer(activePlayerIdx, finalNum);

                        const nextTargetIndex = (players[activePlayerIdx].position + finalNum) % 36;
                        const currentLandingTile = tiles[nextTargetIndex];

                        if (!currentLandingTile.name.includes("再骰一次")) {
                            setActivePlayerIdx(prev => (prev + 1) % players.length);
                        }
                    }
                }, 100);
            };

            // 抽命運卡
            const drawCard = (pIdx) => {
                playSound('card');
                const randomCard = cardDeck[Math.floor(Math.random() * cardDeck.length)];
                setDrawnCard({ ...randomCard, playerIdx: pIdx });
                addLog(`🃏 【${players[pIdx].name}】 抽到了命運卡：【${randomCard.text}】`);
            };

            // 處理抽牌動作
            const handleCardAction = (card, accept) => {
                const player = players[card.playerIdx];
                if (accept) {
                    if (card.type === "keep") {
                        setPlayers(prev => {
                            const updated = [...prev];
                            if (card.value === "avoid") {
                                updated[card.playerIdx].avoidCount += 1;
                                addLog(`🛡️ 【${player.name}】 將【免死金牌】收入背包。`);
                            } else if (card.value.startsWith("reduce-")) {
                                const amount = parseInt(card.value.split("-")[1]);
                                updated[card.playerIdx].reduceAmount += amount;
                                addLog(`🩹 【${player.name}】 獲得了折抵 ${amount} 下的次數保護。`);
                            }
                            return updated;
                        });
                    } else if (card.type === "draw-again") {
                        addLog(`🔄 【${player.name}】 再次抽卡！`);
                        drawCard(card.playerIdx);
                    } else {
                        playSound('punish');
                        const estimated = parseEstimatedHits(card.text, "");
                        setActivePunishment({
                            title: "卡牌罰則",
                            desc: card.text,
                            playerIdx: card.playerIdx,
                            isCard: true
                        });
                        setPunishHits(estimated); 
                    }
                }
                setDrawnCard(null);
            };

            // 道具防護
            const useAvoidCard = (pIdx, type) => {
                setPlayers(prev => {
                    const updated = [...prev];
                    if (type === "avoid" && updated[pIdx].avoidCount > 0) {
                        updated[pIdx].avoidCount -= 1;
                        addLog(`🛡️ 【${updated[pIdx].name}】 消耗【免死金牌】！本次受罰下數歸零！`);
                        setPunishHits(0);
                    } else if (type === "reduce" && updated[pIdx].reduceAmount > 0) {
                        const deduction = Math.min(punishHits, updated[pIdx].reduceAmount);
                        updated[pIdx].reduceAmount -= deduction;
                        setPunishHits(prev => Math.max(0, prev - deduction));
                        addLog(`🩹 【${updated[pIdx].name}】 消耗了 ${deduction} 下折抵值，當前受罰下數降為：${Math.max(0, punishHits - deduction)} 下！`);
                    }
                    return updated;
                });
            };

            // 儲存棋格編輯
            const saveTileEdit = () => {
                if (!editingTile) return;
                setTiles(prev => {
                    const updated = [...prev];
                    updated[editingTile.id] = { ...editingTile };
                    return updated;
                });
                addLog(`⚙️ 更新了第 ${editingTile.id} 格：【${editingTile.name}】`);
                setEditingTile(null);
            };

            // 刪除自訂卡牌
            const deleteCard = (id) => {
                setCardDeck(prev => prev.filter(c => c.id !== id));
            };

            // 新增自訂卡牌
            const addNewCard = () => {
                if (!newCardText.trim()) return;
                const newCard = {
                    id: Date.now(),
                    text: newCardText,
                    type: newCardType,
                    value: newCardValue
                };
                setCardDeck(prev => [...prev, newCard]);
                setNewCardText("");
                setNewCardValue("");
                addLog(`➕ 新増了命運卡牌：【${newCardText}】`);
            };

            return (
                <div class="flex flex-col gap-6 select-none animate-fade-in">
                    
                    {/* Header */}
                    <header class="flex flex-col md:flex-row items-center justify-between border-b border-purple-900/40 pb-4 gap-4">
                        <div class="text-center md:text-left">
                            <h1 class="text-4xl font-extrabold tracking-wider text-pink-500 neon-text-pink flex items-center gap-3 justify-center md:justify-start">
                                <i class="fa-solid fa-chess-board animate-spin-slow"></i> MULTIPLAYER NEON MONOPOLY
                            </h1>
                            <p class="text-xs text-purple-400 mt-1 uppercase tracking-widest font-mono">
                                伴侶 & 派對專用調教大富翁 - 讓實踐好玩多更多
                            </p>
                        </div>
                        
                        {/* 導航控制 */}
                        <div class="flex flex-wrap gap-2 bg-slate-900/85 p-1.5 rounded-full border border-purple-900/30">
                            <button 
                                onClick={() => { setActiveTab("board"); setGameState("setup"); }} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${gameState === "setup" && activeTab === "board" ? "bg-pink-600 text-white shadow-lg shadow-pink-500/30" : "text-slate-400 hover:text-white"}`}>
                                👥 大廳設定
                            </button>
                            <button 
                                onClick={() => { setActiveTab("board"); setGameState("playing"); }} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${gameState === "playing" && activeTab === "board" ? "bg-purple-600 text-white shadow-lg shadow-purple-500/30" : "text-slate-400 hover:text-white"}`}>
                                🎮 開始棋局
                            </button>
                            <button 
                                onClick={() => setActiveTab("custom-tiles")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "custom-tiles" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                ✏️ 自訂棋格
                            </button>
                            <button 
                                onClick={() => setActiveTab("custom-cards")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "custom-cards" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                🃏 命運牌庫
                            </button>
                            <button 
                                onClick={() => setActiveTab("rule")} 
                                class={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeTab === "rule" ? "bg-purple-600 text-white shadow" : "text-slate-400 hover:text-white"}`}>
                                📜 規則說明
                            </button>
                        </div>
                    </header>

                    {/* --- 大廳 (人數與圈數配置) --- */}
                    {gameState === "setup" && activeTab === "board" && (
                        <div class="max-w-4xl mx-auto w-full bg-slate-950/90 p-8 rounded-3xl border border-purple-500/20 neon-border">
                            <h2 class="text-3xl font-black text-pink-500 neon-text-pink mb-2 text-center">
                                👥 派對玩家大廳 Lobby
                            </h2>
                            <p class="text-slate-400 text-center text-sm mb-8">
                                請在此設定「目標圈數」、新增玩家、分派代表色。最高支援 8 人同時挑戰！
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                
                                {/* 左側：新增玩家與圈數設定 */}
                                <div class="bg-slate-900/50 p-6 rounded-2xl border border-purple-955/60 flex flex-col gap-5">
                                    <h3 class="text-lg font-bold text-purple-300">⚙️ 基礎局設設定</h3>
                                    
                                    {/* 圈數自訂 */}
                                    <div class="flex flex-col gap-2">
                                        <label class="text-xs text-slate-400">🏁 目標圈數 (達到即結束並結算挨打王)</label>
                                        <select 
                                            value={maxLaps} 
                                            onChange={(e) => {
                                                const val = e.target.value;
                                                setMaxLaps(val === "unlimited" ? "unlimited" : parseInt(val));
                                            }}
                                            class="bg-black/60 border border-purple-900/50 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-purple-500 text-sm">
                                            <option value={1}>1 圈 (快速快感)</option>
                                            <option value={2}>2 圈 (標準持久)</option>
                                            <option value={3}>3 圈 (深度調教)</option>
                                            <option value={5}>5 圈 (極限挑戰)</option>
                                            <option value="unlimited">無限制 (戰到一方投降為止)</option>
                                        </select>
                                    </div>

                                    <div class="border-t border-purple-900/30 pt-3 flex flex-col gap-4">
                                        <h4 class="text-sm font-bold text-purple-400">➕ 新增派對成員</h4>
                                        <div class="flex flex-col gap-2">
                                            <label class="text-xs text-slate-400">玩家名稱 Name</label>
                                            <input 
                                                type="text"
                                                value={tempPlayerName}
                                                onChange={(e) => setTempPlayerName(e.target.value)}
                                                placeholder="請輸入玩家名字..."
                                                class="bg-black/60 border border-purple-900/50 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-purple-500 text-sm"
                                            />
                                        </div>

                                        <div class="flex flex-col gap-2">
                                            <label class="text-xs text-slate-400">代表棋子霓虹色 Color</label>
                                            <div class="grid grid-cols-4 gap-2">
                                                {colorPalette.map((color) => (
                                                    <button 
                                                        key={color.id}
                                                        type="button"
                                                        onClick={() => setTempPlayerColor(color.id)}
                                                        class={`p-2 rounded-lg border flex flex-col items-center gap-1 transition-all ${
                                                            tempPlayerColor === color.id 
                                                            ? 'border-white bg-purple-950/40 ring-2 ring-purple-500' 
                                                            : 'border-slate-800 opacity-60 hover:opacity-100'
                                                        }`}>
                                                        <span class={`w-3.5 h-3.5 rounded-full ${color.bg}`} />
                                                        <span class="text-[9px] text-slate-300">{color.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <button 
                                            onClick={addPlayer}
                                            class="py-3 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-xl shadow-lg transition-all text-sm">
                                            加入玩家進入名單
                                        </button>
                                    </div>
                                </div>

                                {/* 右側：玩家列表 */}
                                <div class="bg-black/40 p-6 rounded-2xl border border-slate-900 flex flex-col justify-between">
                                    <div>
                                        <h3 class="text-lg font-bold text-purple-300 mb-4 flex justify-between">
                                            <span>📋 參賽名單清單</span>
                                            <span class="text-pink-400 font-mono text-sm">{players.length} / 8</span>
                                        </h3>
                                        <div class="flex flex-col gap-3 max-h-[320px] overflow-y-auto pr-2">
                                            {players.map((p) => (
                                                <div 
                                                    key={p.id}
                                                    class="bg-slate-900/80 p-3 rounded-xl border border-purple-900/10 flex items-center justify-between gap-3">
                                                    <div class="flex items-center gap-3">
                                                        <span class={`w-4.5 h-4.5 rounded-full border border-white/20 ${getPlayerBgClass(p.color)}`} />
                                                        <input 
                                                            type="text"
                                                            value={p.name}
                                                            onChange={(e) => updatePlayerName(p.id, e.target.value)}
                                                            class="bg-transparent text-slate-200 font-bold focus:outline-none border-b border-transparent focus:border-purple-500 text-sm"
                                                        />
                                                    </div>
                                                    <button 
                                                        onClick={() => removePlayer(p.id)}
                                                        class="text-slate-500 hover:text-red-400 transition-colors p-1 text-sm">
                                                        <i class="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => setGameState("playing")}
                                        disabled={players.length < 2}
                                        class="mt-6 w-full py-4 bg-pink-600 hover:bg-pink-500 text-white font-black rounded-xl text-lg shadow-xl shadow-pink-900/30 transition-all disabled:opacity-50 disabled:pointer-events-none uppercase tracking-wider">
                                        🚀 開始遊戲 🚀
                                    </button>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* --- 正式大富翁對決盤 --- */}
                    {gameState === "playing" && activeTab === "board" && (
                        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                            
                            {/* 10x10 大富翁棋盤 */}
                            <div class="xl:col-span-8 bg-slate-950/80 p-4 rounded-3xl border border-purple-500/20 neon-border flex items-center justify-center overflow-auto">
                                <div class="grid grid-cols-10 grid-rows-10 gap-1.5 w-[760px] h-[760px] relative">
                                    
                                    {/* 渲染 36 格 */}
                                    {tiles.map((tile, idx) => {
                                        const coords = getCoordinates(idx);
                                        let bgStyle = "";
                                        
                                        if (tile.type === "red") bgStyle = "from-red-950 to-red-900 border-red-500/50 hover:border-red-400";
                                        else if (tile.type === "orange") bgStyle = "from-orange-950 to-orange-900 border-orange-500/50 hover:border-orange-400";
                                        else if (tile.type === "yellow") bgStyle = "from-yellow-950 to-yellow-900 border-yellow-500/50 hover:border-yellow-400";
                                        else if (tile.type === "blue") bgStyle = "from-blue-950 to-blue-900 border-blue-500/50 hover:border-blue-400";
                                        else bgStyle = "from-pink-950 to-pink-900 border-pink-500/50 hover:border-pink-400";

                                        const landedPlayers = players.filter(p => p.position === idx);

                                        return (
                                            <div 
                                                key={idx}
                                                style={{ gridRow: coords.row, gridColumn: coords.col }}
                                                onClick={() => { setEditingTile(tile); setActiveTab("custom-tiles"); }}
                                                class={`border rounded-xl p-1 flex flex-col justify-between cursor-pointer transition-all hover:scale-105 duration-200 aspect-square bg-gradient-to-br ${bgStyle}`}>
                                                
                                                <div class="flex justify-between items-start text-[8px] opacity-70">
                                                    <span class="font-mono bg-black/40 px-1 rounded text-slate-400">#{idx}</span>
                                                    <span class="uppercase font-semibold text-slate-300">{tile.type}</span>
                                                </div>

                                                <div class="text-[10px] font-bold text-center leading-tight line-clamp-2 my-auto px-0.5 text-slate-100">
                                                    {tile.name}
                                                </div>

                                                {/* 玩家多棋子聚集指示圈 */}
                                                <div class="flex flex-wrap gap-1 justify-center items-center mt-1 min-h-4">
                                                    {landedPlayers.map(p => (
                                                        <span 
                                                            key={p.id}
                                                            class={`w-3.5 h-3.5 rounded-full border border-white animate-bounce ${getPlayerBgClass(p.color)}`}
                                                            title={p.name}
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}

                                    {/* 內圈中央控制台 */}
                                    <div class="col-start-2 col-end-10 row-start-2 row-end-10 bg-slate-900/60 rounded-2xl flex flex-col p-6 items-center justify-between gap-4 border border-purple-900/30">
                                        
                                        <div class="text-center">
                                            <h3 class="text-sm text-purple-400 font-mono tracking-widest">CURRENT TURN</h3>
                                            <div class="text-3xl font-black mt-1 tracking-wide flex items-center justify-center gap-3">
                                                <span class={`w-4.5 h-4.5 rounded-full border border-white/20 ${getPlayerBgClass(players[activePlayerIdx].color)}`} />
                                                <span class={getPlayerTextClass(players[activePlayerIdx].color)}>
                                                    {players[activePlayerIdx].name}
                                                </span>
                                            </div>
                                        </div>

                                        {/* 3D 骰子 */}
                                        <div class="flex flex-col items-center gap-5">
                                            <div class="dice-scene" onClick={rollDice}>
                                                <div class="dice cursor-pointer" style={{ transform: `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)` }}>
                                                    <div class="dice-face face-1"><span class="w-3 h-3 bg-white rounded-full"></span></div>
                                                    <div class="dice-face face-2"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-3"><span class="grid grid-cols-3 gap-2"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-4"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-5"><span class="grid grid-cols-3 gap-1.5"><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span><span class="w-2 h-2 bg-white rounded-full"></span></span></div>
                                                    <div class="dice-face face-6"><span class="grid grid-cols-2 gap-3"><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span><span class="w-2.5 h-2.5 bg-white rounded-full"></span></span></div>
                                                </div>
                                            </div>
                                            
                                            <button 
                                                onClick={rollDice}
                                                disabled={isRolling}
                                                class="px-8 py-3 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-extrabold rounded-full text-lg shadow-lg shadow-purple-900/40 active:scale-95 transition-all disabled:opacity-50">
                                                {isRolling ? "🎲 骰子滾動中..." : "👉 丟擲骰子 👈"}
                                            </button>
                                        </div>

                                        <div class="flex flex-col items-center gap-2">
                                            {/* 手動提前結束遊戲按鈕 */}
                                            <button 
                                                onClick={endGameEarly}
                                                class="px-5 py-2 bg-red-950/50 hover:bg-red-900/80 text-red-400 border border-red-500/30 hover:border-red-500/80 rounded-full text-xs font-bold transition-all shadow active:scale-95">
                                                🚨 提前結束 / 結算戰報
                                            </button>

                                            <button 
                                                onClick={() => setGameState("setup")}
                                                class="text-[11px] text-slate-500 hover:text-slate-300 underline mt-1">
                                                ⚙️ 重新設定大廳 / 更改玩家
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            {/* 右側：全體成員狀態看板 */}
                            <div class="xl:col-span-4 flex flex-col gap-6 w-full">
                                
                                <div class="bg-slate-950/80 p-5 rounded-2xl border border-purple-500/20 shadow-md">
                                    <h3 class="text-xl font-bold text-purple-400 mb-4 flex items-center gap-2">
                                        <i class="fa-solid fa-users"></i> 全體成員狀態數據
                                    </h3>
                                    <div class="flex flex-col gap-3 max-h-[350px] overflow-y-auto pr-2">
                                        {players.map((p, idx) => (
                                            <div 
                                                key={p.id}
                                                class={`p-3 rounded-xl border transition-all ${
                                                    activePlayerIdx === idx 
                                                    ? 'bg-purple-950/20 border-purple-500/80 shadow-[0_0_12px_rgba(168,85,247,0.2)]' 
                                                    : 'bg-slate-900/40 border-slate-800'
                                                }`}>
                                                
                                                <div class="flex items-center justify-between mb-2">
                                                    <div class="flex items-center gap-2 min-w-0">
                                                        <span class={`w-3.5 h-3.5 rounded-full border border-white/10 ${getPlayerBgClass(p.color)}`} />
                                                        <span class="font-bold text-slate-100 text-sm truncate">{p.name}</span>
                                                        {activePlayerIdx === idx && (
                                                            <span class="text-[9px] bg-pink-500 text-white font-bold px-1.5 py-0.5 rounded animate-pulse">
                                                                回合中
                                                            </span>
                                                        )}
                                                    </div>
                                                    <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-mono">
                                                        格數: {p.position}/35
                                                    </span>
                                                </div>

                                                <div class="grid grid-cols-2 gap-1.5 text-xs pt-1.5 border-t border-slate-800/40">
                                                    <div class="bg-black/20 px-2 py-1.5 rounded">
                                                        <span class="text-slate-500 block text-[8px]">🏁 圈數進度</span>
                                                        <span class="font-bold text-blue-400 font-mono text-[11px]">
                                                            {p.lap} / {maxLaps === "unlimited" ? "∞" : maxLaps}
                                                        </span>
                                                    </div>
                                                    <div class="bg-black/20 px-2 py-1.5 rounded">
                                                        <span class="text-slate-500 block text-[8px]">💥 總挨打下數</span>
                                                        <span class="font-bold text-red-400 font-mono text-[11px]">{p.totalHits} 下</span>
                                                    </div>
                                                    <div class="bg-black/20 px-2 py-1.5 rounded">
                                                        <span class="text-slate-500 block text-[8px]">🛡️ 免死金牌</span>
                                                        <span class="font-bold text-pink-400 font-mono text-[11px]">{p.avoidCount} 張</span>
                                                    </div>
                                                    <div class="bg-black/20 px-2 py-1.5 rounded">
                                                        <span class="text-slate-500 block text-[8px]">🩹 累計折抵</span>
                                                        <span class="font-bold text-yellow-400 font-mono text-[11px]">{p.reduceAmount} 下</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 日誌記錄 */}
                                <div class="bg-slate-950/80 p-5 rounded-2xl border border-purple-500/20 flex-grow flex flex-col">
                                    <h3 class="text-xl font-bold text-purple-400 mb-3 flex items-center justify-between">
                                        <span class="flex items-center gap-2">
                                            <i class="fa-solid fa-list-ul"></i> 調教日誌記錄
                                        </span>
                                        <button 
                                            onClick={() => setGameLogs([])}
                                            class="text-xs text-slate-500 hover:text-slate-300">
                                            清除
                                        </button>
                                    </h3>
                                    <div class="bg-black/40 p-4 rounded-xl flex-grow h-[260px] overflow-y-auto font-mono text-sm leading-relaxed flex flex-col gap-2">
                                        {gameLogs.length === 0 ? (
                                            <div class="text-slate-600 italic text-center my-auto">無記錄</div>
                                        ) : (
                                            gameLogs.map((log, i) => (
                                                <div key={i} class="border-b border-purple-950/20 pb-1.5 last:border-0 text-slate-300 text-xs">
                                                    {log}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                            </div>

                        </div>
                    )}

                    {/* 自訂棋格 Tab */}
                    {activeTab === "custom-tiles" && (
                        <div class="bg-slate-950/80 p-6 rounded-3xl border border-purple-500/20 max-w-4xl mx-auto w-full">
                            <h2 class="text-2xl font-black text-pink-500 neon-text-pink mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-pen-to-square"></i> 棋盤格配置完全自訂
                            </h2>
                            <p class="text-sm text-slate-400 mb-6">
                                點擊下方任何一個格子或在棋盤畫面上直接點擊，修改其名稱、類別與底色樣式。包含中文字的「下數」（例如：25下）會被系統自動解析捕捉！
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 棋格列表 */}
                                <div class="bg-black/40 p-4 rounded-2xl max-h-[500px] overflow-y-auto flex flex-col gap-2">
                                    {tiles.map((t) => (
                                        <div 
                                            key={t.id}
                                            onClick={() => setEditingTile(t)}
                                            class={`p-3 rounded-xl border text-sm cursor-pointer transition-all ${
                                                editingTile?.id === t.id 
                                                ? 'bg-purple-900/40 border-purple-500 shadow-md' 
                                                : 'bg-slate-900/50 border-slate-800 hover:bg-slate-900'
                                            }`}>
                                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                                                <span>#{t.id}</span>
                                                <span class="uppercase font-bold">{t.type}</span>
                                            </div>
                                            <div class="font-bold truncate">{t.name}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* 編輯細節 */}
                                <div class="md:col-span-2 bg-slate-900/40 p-6 rounded-2xl border border-purple-955 flex flex-col justify-between">
                                    {editingTile ? (
                                        <div class="flex flex-col gap-4">
                                            <h3 class="text-xl font-bold text-purple-300 pb-2 border-b border-purple-950">
                                                正在編輯第 #{editingTile.id} 格
                                            </h3>
                                            
                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">棋格名稱 (顯示於大富翁網格中)</label>
                                                <input 
                                                    type="text"
                                                    value={editingTile.name}
                                                    onChange={(e) => setEditingTile({ ...editingTile, name: e.target.value })}
                                                    class="bg-black/50 border border-purple-900/50 rounded-lg p-3 text-slate-100 focus:outline-none focus:border-purple-500"
                                                />
                                            </div>

                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">詳細執行說明</label>
                                                <textarea 
                                                    rows="3"
                                                    value={editingTile.desc}
                                                    onChange={(e) => setEditingTile({ ...editingTile, desc: e.target.value })}
                                                    class="bg-black/50 border border-purple-900/50 rounded-lg p-3 text-slate-100 focus:outline-none focus:border-purple-500"
                                                />
                                            </div>

                                            <div class="flex flex-col gap-1.5">
                                                <label class="text-sm text-slate-400">格子屬性種類</label>
                                                <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                                                    {[
                                                        { label: "紅色 (強烈懲罰)", value: "red", color: "bg-red-500" },
                                                        { label: "橘色 (普通懲罰)", value: "orange", color: "bg-orange-500" },
                                                        { label: "黃色 (抽取卡牌)", value: "yellow", color: "bg-yellow-500" },
                                                        { label: "藍色 (特殊動作)", value: "blue", color: "bg-blue-500" },
                                                        { label: "粉色 (安全格子)", value: "pink", color: "bg-pink-500" }
                                                    ].map((opt) => (
                                                        <button 
                                                            key={opt.value}
                                                            onClick={() => setEditingTile({ ...editingTile, type: opt.value })}
                                                            class={`p-2 rounded-lg border text-[10px] font-bold transition-all flex items-center justify-center gap-1.5 ${
                                                                editingTile.type === opt.value 
                                                                ? 'border-white bg-purple-950/40 ring-2 ring-purple-500' 
                                                                : 'border-slate-800 opacity-60 hover:opacity-100'
                                                            }`}>
                                                            <span class={`w-2 h-2 rounded-full ${opt.color}`} />
                                                            {opt.label.split(" ")[0]}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div class="flex gap-4 mt-6">
                                                <button 
                                                    onClick={saveTileEdit}
                                                    class="flex-1 py-3 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold transition-all text-white text-sm">
                                                    💾 保存變更
                                                </button>
                                                <button 
                                                    onClick={() => setEditingTile(null)}
                                                    class="py-3 px-6 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-all text-sm">
                                                    取消
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="text-center text-slate-500 my-auto py-12 flex flex-col items-center gap-4">
                                            <i class="fa-solid fa-arrow-left text-4xl text-purple-900"></i>
                                            請在左側點選，或是直接點選棋盤格子開始進行編輯。
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 命運牌庫 Tab */}
                    {activeTab === "custom-cards" && (
                        <div class="bg-slate-950/80 p-6 rounded-3xl border border-purple-500/20 max-w-4xl mx-auto w-full">
                            <h2 class="text-2xl font-black text-pink-500 neon-text-pink mb-2 flex items-center gap-2">
                                <i class="fa-solid fa-rectangle-list"></i> 命運卡牌庫管理
                            </h2>
                            <p class="text-sm text-slate-400 mb-6">
                                隨時在牌庫內增加懲罰、免除或再抽一次。現有牌庫總數: <strong class="text-pink-400 font-mono">{cardDeck.length}</strong> 張。
                            </p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 新增卡牌 */}
                                <div class="bg-slate-900/40 p-5 rounded-2xl border border-purple-955/60 flex flex-col gap-4">
                                    <h3 class="text-lg font-bold text-purple-300">➕ 新增派對命令卡</h3>
                                    
                                    <div class="flex flex-col gap-1.5">
                                        <label class="text-xs text-slate-400">命令內容 (Text)</label>
                                        <input 
                                            type="text"
                                            value={newCardText}
                                            onChange={(e) => setNewCardText(e.target.value)}
                                            placeholder="請輸入含有'下'的文字或命令..."
                                            class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none"
                                        />
                                    </div>

                                    <div class="flex flex-col gap-1.5">
                                        <label class="text-xs text-slate-400">指令屬性 (Type)</label>
                                        <select 
                                            value={newCardType} 
                                            onChange={(e) => setNewCardType(e.target.value)}
                                            class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none">
                                            <option value="action">普通命令 (抽中立即執行)</option>
                                            <option value="keep">功能手牌 (存進玩家背包)</option>
                                            <option value="draw-again">再抽一次</option>
                                        </select>
                                    </div>

                                    {newCardType === "keep" && (
                                        <div class="flex flex-col gap-1.5">
                                            <label class="text-xs text-slate-400">折抵價值</label>
                                            <select 
                                                value={newCardValue} 
                                                onChange={(e) => setNewCardValue(e.target.value)}
                                                class="bg-black/50 border border-purple-900/50 rounded-lg p-2.5 text-slate-100 text-sm focus:outline-none">
                                                <option value="">--請選擇--</option>
                                                <option value="avoid">免死金牌</option>
                                                <option value="reduce-5">折抵 5 下</option>
                                                <option value="reduce-10">折抵 10 下</option>
                                                <option value="reduce-15">折抵 15 下</option>
                                                <option value="reduce-20">折抵 20 下</option>
                                            </select>
                                        </div>
                                    )}

                                    <button 
                                        onClick={addNewCard}
                                        class="py-2.5 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-lg transition-all text-sm mt-2">
                                        新增至卡牌庫
                                    </button>
                                </div>

                                {/* 卡牌列表 */}
                                <div class="md:col-span-2 bg-black/40 p-5 rounded-2xl flex flex-col">
                                    <h3 class="text-lg font-bold text-purple-300 mb-4">📜 現存所有命運手牌</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-2">
                                        {cardDeck.map((card) => (
                                            <div 
                                                key={card.id}
                                                class="bg-slate-900/80 p-3 rounded-xl border border-purple-900/20 flex items-center justify-between gap-3">
                                                <div class="flex flex-col min-w-0">
                                                    <span class="text-sm font-bold text-slate-200 truncate">{card.text}</span>
                                                    <span class="text-[9px] text-pink-400 font-mono mt-0.5 uppercase">
                                                        {card.type === 'keep' ? `功能防具: ${card.value}` : card.type}
                                                    </span>
                                                </div>
                                                <button 
                                                    onClick={() => deleteCard(card.id)}
                                                    class="text-slate-500 hover:text-red-400 p-1.5 transition-colors">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 玩法規則 Tab */}
                    {activeTab === "rule" && (
                        <div class="bg-slate-950/80 p-8 rounded-3xl border border-purple-500/20 max-w-3xl mx-auto w-full text-slate-300 leading-relaxed">
                            <h2 class="text-3xl font-black text-pink-500 neon-text-pink mb-4 text-center">
                                📜 調教大富翁對決規則
                            </h2>
                            
                            <div class="space-y-6 text-sm">
                                <div>
                                    <h3 class="text-lg font-bold text-purple-400 mb-1">🎲 基本遊戲流程</h3>
                                    <p>在「大廳設定」設定好玩家、棋子顏色與「遊玩目標圈數」。點選「開始棋局」後投擲骰子，跨越起點將使圈數 +1。每個人所承受的痛楚（下數）將被全域累計追蹤！玩累了可以點擊中央控制台下方的「提前結束/結算戰報」按鈕手動結束！</p>
                                </div>

                                <div>
                                    <h3 class="text-lg font-bold text-purple-400 mb-1">🎨 處罰判定與下數折抵</h3>
                                    <ul class="list-disc pl-5 space-y-1.5">
                                        <li><strong class="text-red-400">處罰格與命令</strong>：踩中或抽中處罰時，系統會從內容中智能抽取出預設執行下數，並展開設定視窗。</li>
                                        <li><strong class="text-yellow-400">微調與計數</strong>：玩家可以在視窗中手動修改本次的「實際執行下數」，完成後点击確認，下數會即時加載進他的 `totalHits`。</li>
                                        <li><strong class="text-pink-400">防護手牌</strong>：在受罰時點選【使用折抵】可立刻扣減當前受罰下數；消耗【免死金牌】則可使本次下數直接變為 0。</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer class="text-center text-xs text-slate-600 mt-6 pb-4">
                        此為聚會調教大富翁，請於健康安全、雙方愉悅範疇內娛樂。
                    </footer>

                    {/* --- 命運卡牌翻開 Modal --- */}
                    {drawnCard && (
                        <div class="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                            <div class="bg-gradient-to-br from-slate-900 to-purple-950 border-2 border-yellow-500 p-8 rounded-3xl max-w-sm w-full text-center shadow-[0_0_30px_rgba(234,179,8,0.35)] animate-scale-up">
                                <div class="text-xs font-mono uppercase text-yellow-500 tracking-widest mb-2 font-bold animate-pulse">
                                    -- RANDOM CARD DRAWN --
                                </div>
                                <div class="w-20 h-28 bg-yellow-500/10 border-2 border-dashed border-yellow-500/50 rounded-xl mx-auto flex items-center justify-center mb-6">
                                    <i class="fa-solid fa-wand-magic-sparkles text-4xl text-yellow-500"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-300 mb-1">
                                    【<span class={getPlayerTextClass(players[drawnCard.playerIdx].color)}>{players[drawnCard.playerIdx].name}</span>】抽到了：
                                </h3>
                                <div class="text-xl font-black text-white px-4 py-4 bg-black/40 rounded-xl border border-yellow-500/20 mb-6 neon-text-purple">
                                    {drawnCard.text}
                                </div>
                                <button 
                                    onClick={() => handleCardAction(drawnCard, true)}
                                    class="w-full py-3 bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-black font-black rounded-xl text-md transition-all">
                                    確定 / 收進背包
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- 懲罰宣告 & 實際下數判定 Modal --- */}
                    {activePunishment && (
                        <div class="fixed inset-0 bg-black/85 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                            <div class="bg-gradient-to-br from-slate-900 to-red-950 border-2 border-red-500 p-8 rounded-3xl max-w-md w-full text-center shadow-[0_0_30px_rgba(239,68,68,0.35)] animate-scale-up">
                                <div class="text-xs font-mono uppercase text-red-500 tracking-widest mb-2 font-bold animate-pulse">
                                    ⚠️ -- EXECUTE PUNISHMENT -- ⚠️
                                </div>
                                <div class="w-16 h-16 bg-red-500/20 rounded-full mx-auto flex items-center justify-center mb-4">
                                    <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500 animate-bounce"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-300">
                                    受罰者：<span class={`text-xl font-black ${getPlayerTextClass(players[activePunishment.playerIdx].color)}`}>{players[activePunishment.playerIdx].name}</span>
                                </h3>
                                
                                <div class="text-2xl font-black text-white px-4 py-5 bg-black/50 rounded-xl border border-red-500/20 my-6">
                                    {activePunishment.title}
                                    <div class="text-sm font-normal text-slate-400 mt-2">
                                        {activePunishment.desc}
                                    </div>
                                </div>

                                {/* 智能解析與手動微調下數 */}
                                <div class="flex items-center justify-center gap-3 bg-black/60 p-4 rounded-xl border border-red-500/20 my-5">
                                    <span class="text-slate-400 text-sm">實際執行下數：</span>
                                    <input 
                                        type="number" 
                                        value={punishHits} 
                                        onChange={(e) => setPunishHits(Math.max(0, parseInt(e.target.value) || 0))}
                                        class="bg-slate-900 border border-red-500/40 rounded-lg p-2.5 w-24 text-center font-bold text-red-400 text-xl focus:outline-none"
                                    />
                                    <span class="text-slate-200 font-bold">下</span>
                                </div>

                                {/* 背包道具防禦使用 */}
                                <div class="bg-black/40 p-3 rounded-xl border border-slate-800 mb-6 text-left">
                                    <div class="text-xs text-slate-400 mb-2">檢索可用手牌 (點擊按鈕執行抵扣)：</div>
                                    <div class="flex gap-2">
                                        <button 
                                            disabled={players[activePunishment.playerIdx].avoidCount === 0 || punishHits === 0}
                                            onClick={() => useAvoidCard(activePunishment.playerIdx, 'avoid')}
                                            class="flex-1 py-2 px-3 bg-pink-900/40 hover:bg-pink-900/80 border border-pink-500 rounded-lg text-xs font-bold transition-all disabled:opacity-30 disabled:pointer-events-none">
                                            🛡️ 免死金牌 ({players[activePunishment.playerIdx].avoidCount})
                                        </button>
                                        <button 
                                            disabled={players[activePunishment.playerIdx].reduceAmount === 0 || punishHits === 0}
                                            onClick={() => useAvoidCard(activePunishment.playerIdx, 'reduce')}
                                            class="flex-1 py-2 px-3 bg-yellow-900/40 hover:bg-yellow-900/80 border border-yellow-500 rounded-lg text-xs font-bold transition-all disabled:opacity-30 disabled:pointer-events-none">
                                            🩹 抵扣下數 ({players[activePunishment.playerIdx].reduceAmount}下)
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => {
                                        addLog(`✅ 【${players[activePunishment.playerIdx].name}】 執行處罰完成，實打增加 ${punishHits} 下！`);
                                        setPlayers(prev => prev.map((p, idx) => 
                                            idx === activePunishment.playerIdx 
                                            ? { ...p, totalHits: p.totalHits + punishHits } 
                                            : p
                                        ));
                                        setActivePunishment(null);
                                    }}
                                    class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl transition-all">
                                    乖乖受刑 (完成)
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- 終局結算彈窗 --- */}
                    {winner && (
                        <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 backdrop-blur-md">
                            <div class="bg-gradient-to-br from-slate-900 to-purple-950 border-2 border-pink-500 p-8 rounded-3xl max-w-lg w-full text-center shadow-[0_0_40px_rgba(236,72,153,0.4)] animate-scale-up">
                                <div class="text-xs font-mono uppercase text-pink-500 tracking-widest mb-2 font-bold animate-pulse">
                                    🏆 -- {isEarlyEnd ? "GAME TERMINATED" : "GAME COMPLETED"} -- 🏆
                                </div>
                                <div class="w-20 h-20 bg-pink-500/20 rounded-full mx-auto flex items-center justify-center mb-6">
                                    <i class="fa-solid fa-crown text-4xl text-pink-500"></i>
                                </div>
                                <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400 mb-2">
                                    {isEarlyEnd ? "🚨 遊戲已提前結束！" : `恭喜 【${winner.name}】 率先抵達終點！`}
                                </h2>
                                <p class="text-sm text-slate-400 mb-6">
                                    {isEarlyEnd 
                                        ? `當前進度最領先的玩家為：【${winner.name}】（第 ${winner.lap} 圈 / 第 ${winner.position} 格）。以下為目前累積的「挨打數總戰報」：`
                                        : `率先跑完了規定的 ${maxLaps} 圈！以下是各調教受罰成員的「挨打下總戰報」：`
                                    }
                                </p>

                                {/* 排行榜：總共被打多少下 */}
                                <div class="bg-black/40 p-4 rounded-xl border border-purple-900/30 text-left mb-6 flex flex-col gap-3">
                                    <div class="text-xs text-purple-300 font-bold border-b border-purple-900/40 pb-1.5 flex justify-between">
                                        <span>📊 各成員戰力統計：</span>
                                        <span class="text-red-400 font-bold">💥 累計挨打總數</span>
                                    </div>
                                    {players.map((p) => (
                                        <div key={p.id} class="flex items-center justify-between text-sm">
                                            <div class="flex items-center gap-2">
                                                <span class={`w-2.5 h-2.5 rounded-full ${getPlayerBgClass(p.color)}`} />
                                                <span class="font-bold text-slate-200">{p.name}</span>
                                                {p.id === winner.id && <span class="text-[10px] text-pink-400 font-bold">({isEarlyEnd ? "領先者" : "贏家"})</span>}
                                            </div>
                                            <div class="font-mono text-slate-300">
                                                共挨打：<strong class="text-red-400 font-bold text-base">{p.totalHits}</strong> 下
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button 
                                    onClick={() => {
                                        setWinner(null);
                                        setIsEarlyEnd(false);
                                        setPlayers(prev => prev.map(p => ({
                                            ...p,
                                            position: 0,
                                            avoidCount: 0,
                                            reduceAmount: 0,
                                            lap: 1,
                                            totalHits: 0
                                        })));
                                        setActivePlayerIdx(0);
                                        setGameState("setup");
                                        addLog("🔄 遊戲已全新重設！請在 Lobby 重新配置局設！");
                                    }}
                                    class="w-full py-3.5 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-black rounded-xl text-md transition-all shadow-lg hover:shadow-pink-500/20">
                                    🔄 再來一局挑戰
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
```eof

### ⚡️ 更新版操作細節說明：
1. **如何手動提前結束**：在遊戲進行中，點擊棋盤中央控制台最下方的 **「🚨 提前結束 / 結算戰報」** 紅色按鈕。
2. **自動判定與排序**：點擊後會彈出瀏覽器二次確認提示，點擊確認後，系統會幫您結算出**當前的最高領先者**，並彈出紅粉色的提前結束戰報視窗！
